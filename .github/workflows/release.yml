name: Release

# Tag-driven release. Push a tag matching `v*.*.*` to:
#
#   1. Build sdist + wheel.
#   2. Sign the dists with Sigstore (via PyPI attestations + standalone .sigstore).
#   3. Generate a CycloneDX SBOM and cosign-sign it.
#   4. Publish to PyPI (Trusted Publishing if configured; otherwise the PYPI_API_TOKEN secret).
#   5. Cut a GitHub release with every artifact attached.
#
# One-time setup required before the first run:
#
#   * On PyPI, register https://github.com/aoptimystic/provenex-verifier-python
#     as a trusted publisher for the `provenex-verifier` project with workflow
#     `release.yml` and environment `pypi`.
#     https://docs.pypi.org/trusted-publishers/
#
#     OR
#
#     Add a `PYPI_API_TOKEN` secret to this repository and uncomment the
#     `password` line in the publish step.

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write       # write GitHub release + upload assets
  id-token: write       # OIDC for Sigstore + PyPI trusted publishing
  attestations: write   # GitHub-native attestations

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade build

      - name: Build
        run: python -m build

      - name: Twine check
        run: |
          python -m pip install twine
          python -m twine check dist/*

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  sbom:
    name: Generate + sign SBOM
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Generate CycloneDX SBOM
        uses: anchore/sbom-action@v0
        with:
          path: ./dist
          format: cyclonedx-json
          output-file: ./dist/provenex-verifier-${{ github.ref_name }}.sbom.cdx.json

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign SBOM with cosign (keyless / OIDC)
        run: |
          cosign sign-blob \
            --yes \
            --output-signature ./dist/provenex-verifier-${{ github.ref_name }}.sbom.cdx.json.sig \
            --output-certificate ./dist/provenex-verifier-${{ github.ref_name }}.sbom.cdx.json.crt \
            ./dist/provenex-verifier-${{ github.ref_name }}.sbom.cdx.json

      - uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: dist/provenex-verifier-${{ github.ref_name }}.sbom.cdx.json*

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    environment: pypi
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Trusted publishing is the default. To fall back to a token, add a
          # repository secret named PYPI_API_TOKEN and uncomment:
          # password: ${{ secrets.PYPI_API_TOKEN }}
          attestations: true
          print-hash: true

  github-release:
    name: Cut GitHub release
    runs-on: ubuntu-latest
    needs: [build, sbom, publish-pypi]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - uses: actions/download-artifact@v4
        with:
          name: sbom
          path: dist/

      - name: Resolve release notes file
        id: notes
        run: |
          NOTES_FILE=".github/release-notes/${{ github.ref_name }}.md"
          if [[ -f "$NOTES_FILE" ]]; then
            echo "path=$NOTES_FILE" >> "$GITHUB_OUTPUT"
          else
            echo "path=" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body_path: ${{ steps.notes.outputs.path }}
          generate_release_notes: ${{ steps.notes.outputs.path == '' }}
          files: |
            dist/*.whl
            dist/*.tar.gz
            dist/*.sbom.cdx.json
            dist/*.sbom.cdx.json.sig
            dist/*.sbom.cdx.json.crt
          fail_on_unmatched_files: false
